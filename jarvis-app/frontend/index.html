<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div> 

    <div class="hud-container">
        <!-- HEADER -->
        <header class="hud-header">
            <div class="logo">
                <i class="fa-solid fa-microchip"></i> JARVIS <span>OS</span>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <select id="voice-select" style="background: transparent; color: #00ffcc; border: 1px solid rgba(0,255,204,0.3); border-radius: 4px; padding: 2px 5px; font-family: 'Rajdhani'; outline: none; cursor: pointer; max-width: 180px; text-overflow: ellipsis; font-size: 0.9em;">
                    <option value="">Cargando voces...</option>
                </select>
                <div class="system-status">
                    <span class="status-dot"></span> Online
                </div>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <main class="main-layout">
            
            <!-- LEFT PANEL: MODES -->
            <aside class="side-panel modes-panel">
                <h3><i class="fa-solid fa-layer-group"></i> Modos de Operación</h3>
                <ul id="modes-list" class="mode-list">
                    <!-- Dinámico -->
                </ul>
                <button id="btn-open-mode-modal" class="action-btn mt-10">
                    <i class="fa-solid fa-plus"></i> Crear Nuevo Modo
                </button>
            </aside>

            <!-- CENTER PANEL: AI INTERFACE -->
            <section class="center-panel">
                
                <div class="visualizer-container">
                    <div id="listening-ring" class="ring idle">
                        <div class="core">
                            <i id="mic-icon" class="fa-solid fa-microphone-lines"></i>
                        </div>
                    </div>
                </div>

                <div class="transcript-box">
                    <div id="user-transcript" class="user-text">Esperando interacción...</div>
                    <div id="jarvis-response" class="jarvis-text">Sistema Jarvis. Inicia el sistema para interactuar.</div>
                </div>

                <!-- PANEL DE ARCHIVOS Y LINKS (NUEVO) -->
                <div class="context-input-container">
                    <div class="context-group">
                        <i class="fa-solid fa-link"></i>
                        <input type="url" id="context-url" placeholder="Pegar URL web aquí para extraer texto...">
                    </div>
                    <div class="context-group file-dropzone" id="dropzone" title="Arrastra tu(s) PDF(s) aquí o haz clic para subir">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span id="dropzone-text">Arrastra múltiples archivos aquí (.pdf) o haz clic</span>
                        <input type="file" id="context-file" accept=".pdf,.txt,.docx" style="display:none" multiple>
                        <input type="hidden" id="context-file-path">
                    </div>
                    <div class="context-group input-text">
                        <input type="text" id="manual-text-input" placeholder="O escribe tu comando textualmente aquí y presiona Enter..." autocomplete="off">
                        <button id="btn-send-text"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>

                <div class="controls">
                    <button id="btn-toggle-mic" class="power-btn">
                        <i class="fa-solid fa-microphone"></i> MANTÉN PRESIONADO PARA HABLAR
                    </button>
                </div>

            </section>
        </main>
    </div>

    <!-- MODAL: CREAR MODO -->
    <div id="mode-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <span id="close-modal" class="close">&times;</span>
            <h2>Nuevo Modo de IA</h2>
            <form id="mode-form">
                <div class="form-group">
                    <label for="mode-name">Nombre del Modo:</label>
                    <input type="text" id="mode-name" required placeholder="Ej: Modo Hacker">
                </div>
                <div class="form-group">
                    <label for="mode-desc">Descripción (Propósito del modo):</label>
                    <textarea id="mode-desc" required placeholder="Ej: Respuestas con tono sarcástico y enfocado en ciberseguridad..."></textarea>
                </div>
                <button type="submit" class="action-btn w-100">Guardar en Base de Datos</button>
            </form>
        </div>
    </div>

    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
